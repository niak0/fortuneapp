<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sayfa Bulunamadı — Nasip: Fal & Astroloji</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <style>
    :root{--bg-deep:#120810;--bg-glow:#4A2335;--gold:#D8B46A;--gold-bright:#F4D896;--gold-deep:#9C7838;--ink:#F7ECDD;--ink-soft:#D3B9A9;--ink-faint:#97796B}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-deep);color:var(--ink-soft);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .glow{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 40% at 50% 20%,var(--bg-glow),transparent 60%),var(--bg-deep)}
    .ico{font-size:64px;margin-bottom:16px}
    h1{font-size:72px;font-weight:300;color:var(--gold-bright);letter-spacing:-2px}
    h2{font-size:22px;font-weight:300;color:var(--ink);margin:8px 0 16px}
    p{max-width:380px;margin:0 auto 32px;font-size:15px}
    a{display:inline-block;background:linear-gradient(120deg,var(--gold),var(--gold-deep));color:#1a0f15;font-weight:600;
      padding:14px 30px;border-radius:12px;text-decoration:none}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div>
    <div class="ico">🔮</div>
    <h1>404</h1>
    <h2>Yıldızlar bu sayfayı bulamadı</h2>
    <p>Aradığın sayfa kaybolmuş ya da hiç var olmamış olabilir. Falımıza dönelim mi?</p>
    <a href="/">← Ana sayfaya dön</a>
  </div>
</body>
</html>
